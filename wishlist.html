<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wishlist</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    background:#f5f5f5;
    font-family:Poppins,sans-serif;
    padding:30px;
}

.page-title{
    text-align:center;
    margin-bottom:30px;
    color:#0b7a43;
}

#wishlistContainer{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
}

.wishlist-card{
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
    transition:.3s;
}

.wishlist-card:hover{
    transform:translateY(-5px);
}

.wishlist-card img{
    width:100%;
    height:220px;
    object-fit:contain;
    background:#fff;
}

.wishlist-content{
    padding:15px;
}

.wishlist-content h3{
    margin-bottom:15px;
}

.remove-btn{
    width:100%;
    padding:12px;
    border:none;
    background:#ff4d4d;
    color:#fff;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.remove-btn:hover{
    opacity:.9;
}

.cart-btn{
width:100%;
padding:12px;
border:none;
background:#0a8754;
color:white;
border-radius:8px;
cursor:pointer;
font-weight:bold;
margin-bottom:10px;
}

</style>

</head>
<body>

<h1 class="page-title">❤️ My Wishlist</h1>

<div id="wishlistContainer"></div>

<script>

let wishlist =
JSON.parse(localStorage.getItem("wishlist")) || [];

const container =
document.getElementById("wishlistContainer");

function renderWishlist(){

let html = "";

if(wishlist.length === 0){

html = `
<h2>
No items in wishlist ❤️
</h2>
`;

container.innerHTML = html;
return;
}

wishlist.forEach((item,index)=>{

html += `
<div class="wishlist-card">

<img src="${item.image}">

<div class="wishlist-content">

<h3>${item.name}</h3>

<p style="
font-size:22px;
font-weight:bold;
color:#0a8754;
margin-bottom:15px;
">
₹${item.price}
</p>

<button
class="cart-btn"
onclick="moveToCart(${index})">
🛒 Move To Cart
</button>

<button
class="remove-btn"
onclick="removeWishlist(${index})">
Remove
</button>

</div>

</div>
`;
});

container.innerHTML = html;
}

function removeWishlist(index){

wishlist.splice(index,1);

localStorage.setItem(
"wishlist",
JSON.stringify(wishlist)
);

renderWishlist();
}

renderWishlist();

function moveToCart(index){

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

cart.push({
   name: wishlist[index].name,
   image: wishlist[index].image,
   price: wishlist[index].price,
   quantity: 1
});

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

wishlist.splice(index,1);

localStorage.setItem(
"wishlist",
JSON.stringify(wishlist)
);

renderWishlist();

alert("🛒 Added To Cart");
}

</script>

</body>
</html>
