<!DOCTYPE html>

<html>
<head>
<title>Forgot Password</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
width:350px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#ff6600;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
opacity:0.9;
}

a{
display:block;
margin-top:15px;
text-decoration:none;
}

</style>

</head>

<body>

<div class="box">

<h2>Forgot Password</h2>

<input
type="email"
id="email"
placeholder="Enter Your Email">

<input
type="password"
id="newPassword"
placeholder="Enter New Password">

<button onclick="resetPassword()">
Reset Password
</button>

<a href="login.html">
Back To Login
</a>

</div>

<script>

async function resetPassword(){

const email =
document.getElementById("email").value;

const newPassword =
document.getElementById("newPassword").value;

const response = await fetch(
"https://jabson-foods.onrender.com/reset-password",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email,
newPassword
})
}
);

const data = await response.json();

alert(data.message);

if(data.success){

window.location.href =
"login.html";

}

}

</script>

</body>
</html>
