<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Orders - Jabson Foods</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#eaeded;
}

/* HEADER */

header{
background:#131921;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:30px;
font-weight:bold;
color:#ff9900;
}

.back-btn{
background:#febd69;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
color:black;
font-weight:bold;
}

/* TITLE */

.title{
padding:30px;
font-size:35px;
font-weight:bold;
}

/* ORDER CARD */

.orders-container{
padding:20px;
}

.order-card{
background:white;
border-radius:15px;
padding:25px;
margin-bottom:25px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
transition:0.3s;
}

.order-card:hover{
transform:translateY(-5px);
}

.order-top{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:20px;
margin-bottom:20px;
padding-bottom:15px;
border-bottom:1px solid #ddd;
}

.order-top div{
font-size:15px;
color:#555;
}

.order-top strong{
display:block;
color:black;
margin-bottom:5px;
}

/* PRODUCTS */

.product{
display:flex;
gap:20px;
align-items:center;
margin:20px 0;
padding-bottom:20px;
border-bottom:1px solid #eee;
}

.product img{
width:120px;
height:120px;
object-fit:contain;
background:#f5f5f5;
padding:10px;
border-radius:10px;
}

.product-info{
flex:1;
}

.product-info h3{
font-size:22px;
margin-bottom:10px;
}

.product-info p{
color:#555;
margin:5px 0;
}

/* BUTTONS */

.btns{
display:flex;
gap:15px;
margin-top:15px;
flex-wrap:wrap;
}

.btn{
padding:12px 18px;
border:none;
border-radius:30px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.track-btn{
background:#ffd814;
}

.buy-btn{
background:#ffa41c;
}

.cancel-btn{
background:red;
color:white;
}

.btn:hover{
transform:scale(1.05);
}

/* STATUS */

.status{
display:inline-block;
padding:8px 15px;
background:#00c853;
color:white;
border-radius:30px;
font-weight:bold;
margin-top:10px;
}

/* EMPTY */

.empty{
text-align:center;
padding:100px 20px;
font-size:30px;
color:#666;
}

/* MOBILE */

@media(max-width:768px){

.product{
flex-direction:column;
text-align:center;
}

.order-top{
flex-direction:column;
}

.title{
font-size:28px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">
JABSON
</div>

<a href="index.html" class="back-btn">
⬅ Back To Shop
</a>

</header>

<h1 class="title">
📦 Your Orders
</h1>

<div class="orders-container" id="ordersContainer">

</div>

<script>

async function loadOrders(){

try{

const response =
await fetch(
"https://jabson-foods.onrender.com/orders"
);

const orders =
await response.json();

const userEmail =
localStorage.getItem("userEmail");

const myOrders =
orders.filter(order =>
order.userEmail === userEmail
);

console.log(orders);

const container =
document.getElementById("ordersContainer");


if(myOrders.length === 0){

  container.innerHTML = `
<div class="empty">
🛒 No Orders Yet
</div>
`;

return;

}

container.innerHTML = "";

myOrders.forEach(order=>{

let itemsHTML = "";

console.log("Order Data =", order);
order.items.forEach(item=>{

itemsHTML += `

<div class="product">

<img src="${item.image}">

<div class="product-info">

<h3>${item.name}</h3>

<p>Quantity: ${item.quantity}</p>

<p>Price: ₹${item.price}</p>

<div class="status">
${order.status}
</div>

<div class="btns">

<button class="btn track-btn"
onclick="trackOrder('${order.status}')">
Track Order
</button>

<button class="btn buy-btn"
onclick='buyAgain(${JSON.stringify(order.items).replace(/'/g,"&apos;")})'>
Buy Again
</button>

<button
class="btn"
style="background:#2196f3;color:white;"
onclick="downloadInvoice('${order._id}')">

📄 Invoice

</button>


${order.status === "Pending" ? `
<button class="btn cancel-btn"
onclick="cancelOrder('${order._id}')">
Cancel Order
</button>
` : ""}
</div>

</div>

</div>

`;

});

container.innerHTML += `

<div class="order-card">

<div class="order-top">

<div>
<strong>ORDER PLACED</strong>
${new Date(order.createdAt)
.toLocaleDateString()}
</div>

<div>
<strong>SHIP TO</strong>
Guest User
</div>

<div>
<strong>PAYMENT</strong>
${order.paymentMethod}
</div>

</div>

${itemsHTML}

${getTimeline(order.status)}

<p>
<strong>Total:</strong>
₹${order.totalAmount}
</p>

</div>

`;

});

}catch(error){

console.log(error);

}

}


function buyAgain(items){

  localStorage.setItem(
    "cart",
    JSON.stringify(items)
  );
   alert("Items Added To Cart ✅");

  window.location.href = "index.html";

}

  function downloadInvoice(id){

  window.open(
    "https://jabson-foods.onrender.com/invoice/" + id,
    "_blank"
  );

}


function trackOrder(status){

  alert(
    "Current Status: " + status
  );

}

async function cancelOrder(id){

const ok = confirm(
"Cancel this order?"
);

if(!ok) return;

try{

const response = await fetch(
`https://jabson-foods.onrender.com/cancel-order/${id}`,
{
method:"PUT"
}
);

const data =
await response.json();

if(data.success){

alert("Order Cancelled ✅");

loadOrders();

}

}catch(error){

console.log(error);

}

}

function getTimeline(status){
    if(status === "Cancelled"){

return `
<div style="
background:red;
color:white;
padding:12px;
border-radius:8px;
text-align:center;
font-weight:bold;
margin:15px 0;
">
❌ Order Cancelled
</div>
`;

}

let pending = "";
let shipped = "";
let delivered = "";

if(status === "Pending"){
pending = "active";
}

if(status === "Shipped"){
pending = "active";
shipped = "active";
}

if(status === "Delivered"){
pending = "active";
shipped = "active";
delivered = "active";
}

return `
<div class="timeline">

<div class="step ${pending}">
<div class="step-circle">✓</div>
<p>Order Placed</p>
</div>

<div class="step ${shipped}">
<div class="step-circle">✓</div>
<p>Shipped</p>
</div>

<div class="step ${delivered}">
<div class="step-circle">✓</div>
<p>Delivered</p>
</div>

</div>
`;

}

loadOrders();

</script>

</body>
</html>
