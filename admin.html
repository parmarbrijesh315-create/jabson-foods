<!DOCTYPE html>

<html>
<head>
<title>Admin Dashboard</title>

<style>

body{
font-family:Poppins,sans-serif;
padding:30px;
background:#f5f5f5;
}

h1{
margin-bottom:30px;
}

.dashboard{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.card{
background:white;
width:220px;
padding:30px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
text-align:center;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h2{
margin-top:10px;
}

.logout{
margin-top:30px;
padding:12px 20px;
cursor:pointer;
}

.stat-card{
background:white;
width:220px;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
text-align:center;
}

.order-notification{
position:fixed;
top:20px;
right:20px;
background:#131921;
color:white;
padding:18px 22px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.3);
display:none;
z-index:9999;
font-weight:bold;
}

</style>

<script>

if(localStorage.getItem("adminLoggedIn") !== "true"){
window.location.href="admin-login.html";
}

function logoutAdmin(){
localStorage.removeItem("adminLoggedIn");
window.location.href="admin-login.html";
}

</script>

</head>

<body>

<h1>Admin Dashboard</h1>
<div id="stats" class="dashboard"></div>

<div id="orderNotification" class="order-notification"></div>

<div class="dashboard">

<div class="card"
onclick="window.location.href='products-admin.html'">
📦
<h2>Products</h2>
</div>

<div class="card"
onclick="window.location.href='orders-admin.html'">
🛒
<h2>Orders</h2>
</div>

<div class="card"
onclick="window.location.href='analytics.html'">
📊
<h2>Analytics</h2>
</div>

</div>

<button class="logout"
onclick="logoutAdmin()">
Logout </button>

<script>

async function loadStats(){

try{

const productsResponse =
await fetch("https://jabson-foods.onrender.com/products");

const products =
await productsResponse.json();

const ordersResponse =
await fetch("https://jabson-foods.onrender.com/admin/orders");

const orders =
await ordersResponse.json();

let revenue = 0;
let delivered = 0;
let pending = 0;

orders.forEach(order=>{

if(order.status !== "Cancelled"){
  revenue += Number(order.totalAmount || 0);
}

if(order.status === "Delivered"){
delivered++;
}else{
pending++;
}

});

document.getElementById("stats").innerHTML = `

<div class="stat-card">
📦
<h2>${products.length}</h2>
<p>Total Products</p>
</div>

<div class="stat-card">
🛒
<h2>${orders.length}</h2>
<p>Total Orders</p>
</div>

<div class="stat-card">
💰
<h2>₹${revenue.toFixed(2)}</h2>
<p>Total Revenue</p>
</div>

<div class="stat-card">
🚚
<h2>${delivered}</h2>
<p>Delivered</p>
</div>

<div class="stat-card">
⏳
<h2>${pending}</h2>
<p>Pending</p>
</div>

`;

}catch(error){
console.log(error);
}

}

let lastOrderId = localStorage.getItem("lastOrderId");

async function checkNewOrders(){

  const response = await fetch("https://jabson-foods.onrender.com/admin/orders");
  const orders = await response.json();

  if(orders.length === 0) return;

  const latestOrder = orders[0];

  if(lastOrderId && latestOrder._id !== lastOrderId){

    const box = document.getElementById("orderNotification");

    box.innerHTML = `
      🔔 New Order Received<br>
      ${latestOrder.customerName}<br>
      ₹${latestOrder.totalAmount}
    `;

    box.style.display = "block";

    setTimeout(()=>{
      box.style.display = "none";
    },4000);
  }

  lastOrderId = latestOrder._id;
  localStorage.setItem("lastOrderId", latestOrder._id);
}

checkNewOrders();
setInterval(checkNewOrders,5000);

loadStats();
setInterval(loadStats,5000);

</script>

</body>
</html>
