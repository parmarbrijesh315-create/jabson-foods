<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login - Jabson Foods</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f5f5;
}

.login-box{
background:white;
padding:30px;
width:350px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}

.login-box h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#0a7d3b;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#066b31;
}
</style>
</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input
type="email"
id="email"
placeholder="Enter Admin Email"
>

<input
type="password"
id="password"
placeholder="Enter Password"
>

<button onclick="adminLogin()">
Login
</button>

</div>

<script>
function adminLogin(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

if(
email === "admin@jabson.com"
&&
password === "123456"
){

localStorage.setItem(
"adminLoggedIn",
"true"
);

window.location.href =
"admin.html";

}
else{

alert("Invalid Login");

}

}
</script>

</body>
</html>
